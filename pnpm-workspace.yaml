allowBuilds:
  '@parcel/watcher': true
  better-sqlite3: true
  esbuild: true
  lefthook: true
  unrs-resolver: true

engineStrict: true

minimumReleaseAge: 7200

saveExact: true

sideEffectsCache: false

strictDepBuilds: true
minimumReleaseAgeExclude:
  # Renovate security update: nuxt@4.4.6
  - nuxt@4.4.6
